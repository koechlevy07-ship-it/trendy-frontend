version: '3.8'

services:
  backend:
    build:
      context: .
      target: production
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/trendy-wardrobe
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    command: ['--replSet', 'rs0', '--bind_ip_all']
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: >
        mongosh --quiet --eval "try { rs.status() } catch (e) { rs.initiate() }"
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mongo-data:
