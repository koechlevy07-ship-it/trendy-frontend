<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trendy_Wardrobe — Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== ALL EXISTING STYLES – UNCHANGED ===== */
        /* (Keep all your current CSS exactly as it is – no changes needed) */
        /* For brevity, I'm not repeating the entire CSS here. Use the same CSS from your current admin.html. */
        /* ============================================================ */
    </style>
</head>
<body>

    <!-- ===== LOGIN PAGE – UNCHANGED ===== -->
    <div class="login-page" id="loginPage">
        <!-- ... same as before ... -->
    </div>

    <!-- ===== ADMIN DASHBOARD – UNCHANGED ===== -->
    <div class="admin-app" id="adminApp">
        <!-- ... same as before ... -->
    </div>

    <!-- ===== MODALS – UNCHANGED ===== -->
    <!-- ... -->

    <!-- ============================================================
    JAVASCRIPT – FIXED (settings endpoints removed, fallback added)
    ============================================================ -->
    <script>
        // ============================================================
        // CONFIGURATION
        // ============================================================
        const API_URL = 'https://trendy-backend-jq27.onrender.com/api';
        let adminToken = localStorage.getItem('adminToken');
        let currentPanel = 'dashboard';

        // ============================================================
        // TOAST
        // ============================================================
        function showToast(msg, type = '') {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMessage');
            toastMsg.textContent = msg;
            toast.className = 'toast';
            if (type) toast.classList.add(type);
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // ============================================================
        // AUTH – UNCHANGED
        // ============================================================
        function isAdminLoggedIn() { return !!adminToken; }

        function adminLogin(token) {
            adminToken = token;
            localStorage.setItem('adminToken', token);
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('adminApp').classList.add('active');
            loadDashboard();
            loadProducts();
            loadOrders();
            loadCustomers();
            // loadSettings() is now removed – we'll use default values
        }

        function adminLogout() {
            adminToken = null;
            localStorage.removeItem('adminToken');
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('adminApp').classList.remove('active');
            showToast('Logged out successfully');
        }

        // ============================================================
        // LOGIN FORM – UNCHANGED
        // ============================================================
        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value.trim();
            const errorEl = document.getElementById('loginError');
            errorEl.style.display = 'none';

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    errorEl.textContent = data.message || 'Login failed';
                    errorEl.style.display = 'block';
                    return;
                }
                if (data.user.role !== 'admin') {
                    errorEl.textContent = 'Access denied. Admin only.';
                    errorEl.style.display = 'block';
                    return;
                }
                adminLogin(data.token);
                showToast('Welcome back, Admin!', 'success');
            } catch (err) {
                errorEl.textContent = 'Connection error. Please try again.';
                errorEl.style.display = 'block';
            }
        });

        // ============================================================
        // LOGOUT
        // ============================================================
        document.getElementById('logoutBtn').addEventListener('click', adminLogout);

        // ============================================================
        // SIDEBAR NAVIGATION – UNCHANGED
        // ============================================================
        document.querySelectorAll('.sidebar .nav-item[data-panel]').forEach(item => {
            item.addEventListener('click', function() {
                const panel = this.dataset.panel;
                switchPanel(panel);
            });
        });

        function switchPanel(panel) {
            currentPanel = panel;
            document.querySelectorAll('.sidebar .nav-item[data-panel]').forEach(el => el.classList.remove('active'));
            document.querySelector(`.sidebar .nav-item[data-panel="${panel}"]`).classList.add('active');
            document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
            const panelEl = document.getElementById(`panel-${panel}`);
            if (panelEl) panelEl.classList.add('active');
            const titles = {
                dashboard: 'Dashboard',
                products: 'Products',
                orders: 'Orders',
                customers: 'Customers',
                settings: 'Settings'
            };
            document.getElementById('panelTitle').textContent = titles[panel] || 'Dashboard';
            if (panel === 'dashboard') loadDashboard();
            if (panel === 'products') loadProducts();
            if (panel === 'orders') loadOrders();
            if (panel === 'customers') loadCustomers();
            document.getElementById('sidebar').classList.remove('open');
        }

        // ============================================================
        // HAMBURGER MENU
        // ============================================================
        document.getElementById('hamburgerBtn').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // ============================================================
        // DASHBOARD – UNCHANGED
        // ============================================================
        async function loadDashboard() {
            try {
                const [productsRes, ordersRes, customersRes] = await Promise.all([
                    fetch(`${API_URL}/products`),
                    fetch(`${API_URL}/orders/admin`, { headers: { 'Authorization': `Bearer ${adminToken}` } }),
                    fetch(`${API_URL}/users`, { headers: { 'Authorization': `Bearer ${adminToken}` } })
                ]);

                const products = productsRes.ok ? await productsRes.json() : [];
                const orders = ordersRes.ok ? await ordersRes.json() : [];
                const customers = customersRes.ok ? await customersRes.json() : [];

                document.getElementById('statProducts').textContent = products.length || 0;
                document.getElementById('statOrders').textContent = orders.length || 0;
                document.getElementById('statCustomers').textContent = customers.length || 0;

                const totalRevenue = orders.reduce((sum, o) => sum + (o.total || 0), 0);
                document.getElementById('statRevenue').textContent = `Ksh ${totalRevenue.toLocaleString()}`;

                const recent = orders.slice(0, 5);
                const container = document.getElementById('recentOrdersTable');
                if (recent.length === 0) {
                    container.innerHTML = '<p style="color:var(--text-secondary);font-size:14px;">No recent orders.</p>';
                } else {
                    let html = `<table style="width:100%;border-collapse:collapse;font-size:13px;">
                        <thead><tr style="background:var(--bg-primary);">
                            <th style="padding:10px 14px;text-align:left;">Order #</th>
                            <th style="padding:10px 14px;text-align:left;">Total</th>
                            <th style="padding:10px 14px;text-align:left;">Status</th>
                            <th style="padding:10px 14px;text-align:left;">Date</th>
                        </tr></thead><tbody>`;
                    recent.forEach(o => {
                        const statusClass = o.status || 'pending';
                        html += `<tr>
                            <td style="padding:10px 14px;font-weight:600;">#${o.orderNumber || o._id.slice(-8)}</td>
                            <td style="padding:10px 14px;">Ksh ${(o.total || 0).toLocaleString()}</td>
                            <td style="padding:10px 14px;"><span class="status-badge ${statusClass}">${statusClass}</span></td>
                            <td style="padding:10px 14px;">${new Date(o.createdAt).toLocaleDateString()}</td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                    container.innerHTML = html;
                }
            } catch (err) {
                console.error('Dashboard error:', err);
            }
        }

        // ============================================================
        // PRODUCTS – UNCHANGED
        // ============================================================
        async function loadProducts() {
            try {
                const res = await fetch(`${API_URL}/products`);
                if (!res.ok) throw new Error('Failed');
                const products = await res.json();
                document.getElementById('productCount').textContent = products.length;
                const tbody = document.getElementById('productsTableBody');
                if (products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-secondary);">No products found.</td></tr>';
                    return;
                }
                let html = '';
                products.forEach(p => {
                    const img = p.images && p.images.length > 0 ? p.images[0] : '';
                    html += `<tr>
                        <td><img src="${img ? `${API_URL.replace('/api','')}${img}` : 'https://placehold.co/50x50/FAF9F6/C8A35A?text=?'}" alt="${p.name}" style="width:50px;height:50px;object-fit:cover;border-radius:4px;" /></td>
                        <td><strong>${p.name}</strong></td>
                        <td>${p.category || '-'}</td>
                        <td>Ksh ${p.price.toLocaleString()}</td>
                        <td>${p.stock || 0}</td>
                        <td>
                            <button class="btn-sm edit" onclick="editProduct('${p._id}')"><i class="fas fa-edit"></i></button>
                            <button class="btn-sm delete" onclick="deleteProduct('${p._id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
                });
                tbody.innerHTML = html;
            } catch (err) {
                console.error('Products error:', err);
            }
        }

        // ============================================================
        // PRODUCT CRUD – UNCHANGED
        // ============================================================
        document.getElementById('addProductBtn').addEventListener('click', function() {
            document.getElementById('productModalTitle').textContent = 'Add Product';
            document.getElementById('productSubmitBtn').textContent = 'Save Product';
            document.getElementById('editProductId').value = '';
            document.getElementById('productForm').reset();
            document.getElementById('productModal').classList.add('show');
        });

        document.getElementById('closeProductModal').addEventListener('click', function() {
            document.getElementById('productModal').classList.remove('show');
        });
        document.getElementById('productModal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('show');
        });

        window.editProduct = async function(id) {
            try {
                const res = await fetch(`${API_URL}/products/${id}`);
                const p = await res.json();
                document.getElementById('productModalTitle').textContent = 'Edit Product';
                document.getElementById('productSubmitBtn').textContent = 'Update Product';
                document.getElementById('editProductId').value = p._id;
                document.getElementById('productName').value = p.name || '';
                document.getElementById('productCategory').value = p.category || 'trench-coat';
                document.getElementById('productGender').value = p.gender || 'men';
                document.getElementById('productPrice').value = p.price || '';
                document.getElementById('productOriginalPrice').value = p.originalPrice || '';
                document.getElementById('productStock').value = p.stock || 0;
                document.getElementById('productFeatured').value = p.featured ? 'true' : 'false';
                document.getElementById('productDescription').value = p.description || '';
                document.getElementById('productImages').value = (p.images || []).join(', ');
                document.getElementById('productSizes').value = (p.sizes || []).join(', ');
                document.getElementById('productColors').value = (p.colors || []).join(', ');
                document.getElementById('productModal').classList.add('show');
            } catch (err) {
                showToast('Failed to load product', 'error');
            }
        };

        document.getElementById('productForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = document.getElementById('editProductId').value;
            const data = {
                name: document.getElementById('productName').value.trim(),
                category: document.getElementById('productCategory').value,
                gender: document.getElementById('productGender').value,
                price: parseFloat(document.getElementById('productPrice').value),
                originalPrice: parseFloat(document.getElementById('productOriginalPrice').value) || undefined,
                stock: parseInt(document.getElementById('productStock').value) || 0,
                featured: document.getElementById('productFeatured').value === 'true',
                description: document.getElementById('productDescription').value.trim(),
                images: document.getElementById('productImages').value.split(',').map(s => s.trim()).filter(Boolean),
                sizes: document.getElementById('productSizes').value.split(',').map(s => s.trim()).filter(Boolean),
                colors: document.getElementById('productColors').value.split(',').map(s => s.trim()).filter(Boolean)
            };

            try {
                const url = id ? `${API_URL}/products/${id}` : `${API_URL}/products`;
                const method = id ? 'PUT' : 'POST';
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!res.ok) throw new Error('Failed to save product');
                showToast(id ? 'Product updated!' : 'Product added!', 'success');
                document.getElementById('productModal').classList.remove('show');
                loadProducts();
                loadDashboard();
            } catch (err) {
                showToast('Failed to save product', 'error');
            }
        });

        window.deleteProduct = async function(id) {
            if (!confirm('Delete this product?')) return;
            try {
                const res = await fetch(`${API_URL}/products/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Failed');
                showToast('Product deleted', 'success');
                loadProducts();
                loadDashboard();
            } catch (err) {
                showToast('Failed to delete product', 'error');
            }
        };

        // ============================================================
        // ORDERS – UNCHANGED
        // ============================================================
        async function loadOrders() {
            try {
                const filter = document.getElementById('orderFilter').value;
                const url = filter === 'all' ? `${API_URL}/orders/admin` : `${API_URL}/orders/admin?status=${filter}`;
                const res = await fetch(url, { headers: { 'Authorization': `Bearer ${adminToken}` } });
                if (!res.ok) throw new Error('Failed');
                const orders = await res.json();
                document.getElementById('orderCount').textContent = orders.length;
                const tbody = document.getElementById('ordersTableBody');
                if (orders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-secondary);">No orders found.</td></tr>';
                    return;
                }
                let html = '';
                orders.forEach(o => {
                    const statusClass = o.status || 'pending';
                    const customerName = o.shippingAddress?.fullName || 'Guest';
                    html += `<tr>
                        <td><strong>#${o.orderNumber || o._id.slice(-8)}</strong></td>
                        <td>${customerName}</td>
                        <td>Ksh ${(o.total || 0).toLocaleString()}</td>
                        <td><span class="status-badge ${statusClass}">${statusClass}</span></td>
                        <td>${new Date(o.createdAt).toLocaleDateString()}</td>
                        <td>
                            <button class="btn-sm view" onclick="openOrderStatus('${o._id}')"><i class="fas fa-pen"></i></button>
                        </td>
                    </tr>`;
                });
                tbody.innerHTML = html;
            } catch (err) {
                console.error('Orders error:', err);
            }
        }

        document.getElementById('orderFilter').addEventListener('change', loadOrders);

        window.openOrderStatus = function(id) {
            document.getElementById('editOrderId').value = id;
            document.getElementById('orderStatusSelect').value = 'pending';
            document.getElementById('orderStatusModal').classList.add('show');
        };

        document.getElementById('closeOrderStatusModal').addEventListener('click', function() {
            document.getElementById('orderStatusModal').classList.remove('show');
        });
        document.getElementById('orderStatusModal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('show');
        });

        document.getElementById('updateOrderStatusBtn').addEventListener('click', async function() {
            const id = document.getElementById('editOrderId').value;
            const status = document.getElementById('orderStatusSelect').value;
            try {
                const res = await fetch(`${API_URL}/orders/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${adminToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                if (!res.ok) throw new Error('Failed');
                showToast('Order status updated!', 'success');
                document.getElementById('orderStatusModal').classList.remove('show');
                loadOrders();
                loadDashboard();
            } catch (err) {
                showToast('Failed to update status', 'error');
            }
        });

        // ============================================================
        // CUSTOMERS – UNCHANGED
        // ============================================================
        async function loadCustomers() {
            try {
                const res = await fetch(`${API_URL}/users`, { headers: { 'Authorization': `Bearer ${adminToken}` } });
                if (!res.ok) throw new Error('Failed');
                const users = await res.json();
                document.getElementById('customerCount').textContent = users.length;
                const tbody = document.getElementById('customersTableBody');
                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-secondary);">No customers found.</td></tr>';
                    return;
                }
                let html = '';
                users.forEach(u => {
                    html += `<tr>
                        <td><strong>${u.name}</strong></td>
                        <td>${u.email}</td>
                        <td>${new Date(u.createdAt).toLocaleDateString()}</td>
                        <td>${u.orderCount || 0}</td>
                    </tr>`;
                });
                tbody.innerHTML = html;
            } catch (err) {
                console.error('Customers error:', err);
            }
        }

        // ============================================================
        // SETTINGS – REMOVED (commented out) to prevent 404 errors
        // The settings panel now shows default placeholders.
        // You can add backend endpoints later and uncomment this.
        // ============================================================
        // (We keep the settings UI but don't load/save from the backend)
        // The save buttons are disabled or do nothing.
        // ============================================================

        // ============================================================
        // INIT
        // ============================================================
        if (isAdminLoggedIn()) {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('adminApp').classList.add('active');
            loadDashboard();
            loadProducts();
            loadOrders();
            loadCustomers();
            // loadSettings() is not called anymore
        } else {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('adminApp').classList.remove('active');
        }

        // ============================================================
        // SETTINGS BUTTON OVERRIDES – disabled to prevent errors
        // ============================================================
        document.querySelectorAll('.settings-card .btn-save').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                showToast('⚠️ Settings backend not yet implemented. Placeholder only.', 'error');
            });
        });
    </script>
</body>
</html>
