# Server
NODE_ENV=development
PORT=5000

# Database
MONGODB_URI=mongodb+srv://<user>:<password>@<cluster>.mongodb.net/trendy-wardrobe?retryWrites=true&w=majority

# Auth
JWT_SECRET=replace-with-a-long-random-secret
JWT_EXPIRES_IN=7d
JWT_REFRESH_SECRET=replace-with-a-different-long-random-secret
JWT_REFRESH_EXPIRES_IN=30d

# Cloudinary
CLOUDINARY_CLOUD_NAME=
CLOUDINARY_API_KEY=
CLOUDINARY_API_SECRET=

# M-Pesa Daraja API (Safaricom) — get from https://developer.safaricom.co.ke
MPESA_ENV=sandbox
MPESA_CONSUMER_KEY=
MPESA_CONSUMER_SECRET=
MPESA_SHORTCODE=
MPESA_PASSKEY=
MPESA_CALLBACK_URL=https://your-backend.onrender.com/api/payments/mpesa/callback

# Email (SMTP)
SMTP_HOST=
SMTP_PORT=587
SMTP_USER=
SMTP_PASS=
EMAIL_FROM=no-reply@trendywardrobe.co.ke
EMAIL_FROM_NAME=Trendy Wardrobe

# SMS (Africa's Talking)
SMS_PROVIDER=africastalking
AT_API_KEY=
AT_USERNAME=
AT_SENDER_ID=

# WhatsApp (Meta Cloud API)
WHATSAPP_PHONE_NUMBER_ID=
WHATSAPP_ACCESS_TOKEN=

# CORS
FRONTEND_URL=http://localhost:3000

# Currency
DEFAULT_CURRENCY=KES
